<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Registration Successful</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .icon { font-size: 4rem; margin-bottom: 1rem; }

    h1 {
      color: #1a1a2e;
      font-size: 1.6rem;
      margin-bottom: 0.6rem;
    }

    p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    a:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Registration Successful!</h1>
    <p>You have successfully registered for the event.<br>We look forward to seeing you there!</p>
    <a href="{% url 'register' %}">Register Another</a>
  </div>
</body>
</html>
